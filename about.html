<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- buena escala para los teléfonos -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About</title>

    <style>
        body {
            background-color: #f5f5dc;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            align-items: center;
            gap: 40px;
            max-width: 900px;
            width: 85%;
            margin: auto;
            padding: 20px;
        }

        img {
            width: 240px;
            height: auto;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .bio {
            font-size: 20px;
            line-height: 1.6;
            color: #111;
        }

        .bio p {
            margin: 0 0 15px 0;
        }

        .bio p:last-child {
            margin-bottom: 0;
        }

        a {
            color: #0055aa;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* hace el ajuste automático para celulares */
        @media (max-width: 768px) {
            body {
                align-items: flex-start; /*scroll natural */
            }
            .container {
                flex-direction: column;
                text-align: center;
                gap: 25px;
                padding: 40px 20px;
            }
            img {
                width: 200px; /* más pequeño en teléfono para balancear */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Image source -->
        <img src="https://i.postimg.cc/1tYq2LP4/marco.jpg" alt="Marco Antonio Peña Ibarra">

        <!-- Paragraphs -->
        <div class="bio">
            <p>
                I hold a B.S. in Pure Mathematics with a minor in Computer Science from the University of Texas Rio Grande Valley.
            </p>
            <p>
                I enjoy running, chess, and Rubik's cubes.
            </p>
            <p>
                Here are my chess accounts: chess.com and lichess
            <br>
                <a href="https://www.chess.com/member/mapipo100" target="_blank">@mapipo100</a> — 
                <a href="https://lichess.org/@/mapi100" target="_blank">@mapi100</a>
            </p>
        </div>
    </div>

</body>
</html>
